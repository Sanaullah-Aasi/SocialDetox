name: socialdetox
description: A productivity app that blocks internet access for selected apps
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  
  # Core engine (local package)
  social_detox_core:
    path: ./packages/social_detox_core
  
  # Local storage
  shared_preferences: ^2.2.0
  
  # State management
  provider: ^6.1.0
  
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.2
  purchases_flutter: ^9.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
